<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typograf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Bebas+Neue&family=Pacifico&family=Source+Code+Pro&family=Cinzel&family=Dancing+Script&family=Oswald&family=Permanent+Marker&family=Rajdhani&family=Libre+Baskerville&family=Orbitron&family=Lora&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0c0a; color: #f0e6d3; font-family: 'Rajdhani', sans-serif; }
.header { padding: 20px; display: flex; align-items: baseline; gap: 12px; }
.header h1 { font-family: 'Cinzel', serif; font-size: 20px; letter-spacing: 4px; color: #c9a96e; text-transform: uppercase; }
.header span { font-size: 12px; color: #9a8060; letter-spacing: 2px; }
.main { display: flex; flex-direction: column; }
.sidebar { padding: 12px 16px; border-bottom: 1px solid #1e1a14; }
.sidebar-label { font-size: 10px; letter-spacing: 3px; color: #a08860; text-transform: uppercase; margin-bottom: 8px; display: block; }
.font-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.font-btn { background: #1a1610; border: 1px solid #2a2218; border-radius: 6px; padding: 6px 12px; cursor: pointer; color: #d0c4a8; font-size: 13px; transition: all 0.2s; }
.font-btn.active { border-color: #c9a96e; color: #c9a96e; background: #1e1a10; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.control-row { display: flex; flex-direction: column; gap: 4px; }
.control-label { font-size: 11px; color: #b09070; display: flex; justify-content: space-between; }
.control-value { color: #c9a96e; }
.slider { width: 100%; -webkit-appearance: none; height: 2px; background: #2a2218; border-radius: 2px; outline: none; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #c9a96e; cursor: pointer; }
.style-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.toggle-btn { background: #1a1610; border: 1px solid #2a2218; border-radius: 6px; color: #b09070; font-size: 13px; padding: 6px 16px; cursor: pointer; font-family: 'Rajdhani', sans-serif; }
.toggle-btn.on { border-color: #c9a96e; color: #c9a96e; background: #1e1a10; }
.color-row { display: flex; align-items: center; gap: 10px; }
.color-input { width: 36px; height: 36px; border: none; border-radius: 6px; cursor: pointer; background: #1a1610; }
.color-hex { font-size: 13px; color: #c0a070; font-family: 'Source Code Pro', monospace; }
.preview-area { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.presets { display: flex; flex-wrap: wrap; gap: 8px; }
.preset-btn { background: #1a1610; border: 1px solid #2a2218; border-radius: 20px; color: #a08060; font-size: 11px; padding: 5px 12px; cursor: pointer; font-family: 'Rajdhani', sans-serif; }
.text-input { width: 100%; background: #12100d; border: 1px solid #1e1a14; border-radius: 8px; color: #d0c4a8; font-size: 14px; padding: 10px 14px; outline: none; font-family: 'Rajdhani', sans-serif; resize: none; }
.canvas { background: #12100d; border: 1px solid #1a1610; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 30px; min-height: 180px; }
.preview-text { text-align: center; word-break: break-word; transition: all 0.3s; }
.bottom-row { display: flex; justify-content: space-between; align-items: center; }
.font-current-name { font-family: 'Cinzel', serif; font-size: 11px; color: #a08060; letter-spacing: 2px; }
.copy-btn { background: #1e1a10; border: 1px solid #c9a96e44; border-radius: 6px; color: #c9a96e; font-size: 11px; padding: 8px 16px; cursor: pointer; font-family: 'Rajdhani', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="header">
  <h1>Typograf</h1>
  <span>Nastavení fontu textu</span>
</div>
<div class="main">
  <div class="sidebar">
    <span class="sidebar-label">Písmo</span>
    <div class="font-list" id="fontList"></div>
    <div class="controls">
      <div class="control-row">
        <div class="control-label"><span>Velikost</span><span class="control-value" id="sizeVal">48px</span></div>
        <input type="range" class="slider" id="fontSize" min="12" max="120" value="48">
      </div>
      <div class="control-row">
        <div class="control-label"><span>Mezery</span><span class="control-value" id="spacingVal">0px</span></div>
        <input type="range" class="slider" id="letterSpacing" min="-5" max="30" value="0">
      </div>
      <div class="control-row">
        <div class="control-label"><span>Výška řádku</span><span class="control-value" id="lineVal">1.3</span></div>
        <input type="range" class="slider" id="lineHeight" min="0.8" max="3" step="0.05" value="1.3">
      </div>
    </div>
    <div class="style-row">
      <button class="toggle-btn" id="boldBtn" onclick="toggleBold()"><b>B</b> Tučné</button>
      <button class="toggle-btn" id="italicBtn" onclick="toggleItalic()"><i>I</i> Kurzíva</button>
      <div class="color-row">
        <input type="color" class="color-input" id="colorPicker" value="#f0e6d3">
        <span class="color-hex" id="colorHex">#F0E6D3</span>
      </div>
    </div>
  </div>
  <div class="preview-area">
    <div class="presets">
      <button class="preset-btn" onclick="setText('Rychlá liška přeskočila líného psa')">Nadpis</button>
      <button class="preset-btn" onclick="setText('Moje Značka')">Logo</button>
      <button class="preset-btn" onclick="setText('Slova mají moc měnit světy.')">Citát</button>
      <button class="preset-btn" onclick="setText('KOUPIT NYNÍ')">Tlačítko</button>
    </div>
    <textarea class="text-input" id="textInput" rows="2" placeholder="Zadejte vlastní text...">Rychlá liška přeskočila líného psa</textarea>
    <div class="canvas"><div class="preview-text" id="previewText">Rychlá liška přeskočila líného psa</div></div>
    <div class="bottom-row">
      <span class="font-current-name" id="fontName">PLAYFAIR DISPLAY · Serif</span>
      <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Kopírovat CSS</button>
    </div>
  </div>
</div>
<script>
const FONTS = [
  { name: "Playfair Display", style: "'Playfair Display', serif", category: "Serif" },
  { name: "Bebas Neue", style: "'Bebas Neue', sans-serif", category: "Display" },
  { name: "Pacifico", style: "'Pacifico', cursive", category: "Rukopis" },
  { name: "Source Code Pro", style: "'Source Code Pro', monospace", category: "Mono" },
  { name: "Cinzel", style: "'Cinzel', serif", category: "Klasika" },
  { name: "Dancing Script", style: "'Dancing Script', cursive", category: "Rukopis" },
  { name: "Oswald", style: "'Oswald', sans-serif", category: "Sans" },
  { name: "Permanent Marker", style: "'Permanent Marker', cursive", category: "Rukopis" },
  { name: "Rajdhani", style: "'Rajdhani', sans-serif", category: "Sans" },
  { name: "Libre Baskerville", style: "'Libre Baskerville', serif", category: "Serif" },
  { name: "Orbitron", style: "'Orbitron', sans-serif", category: "Sci-Fi" },
  { name: "Lora", style: "'Lora', serif", category: "Serif" },
];
let selected = FONTS[0], bold = false, italic = false;
const preview = document.getElementById('previewText');
const fontList = document.getElementById('fontList');

FONTS.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'font-btn' + (i === 0 ? ' active' : '');
  btn.textContent = f.name;
  btn.style.fontFamily = f.style;
  btn.onclick = () => { selected = f; document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('fontName').textContent = f.name.toUpperCase() + ' · ' + f.category; updatePreview(); };
  fontList.appendChild(btn);
});

function updatePreview() {
  preview.style.fontFamily = selected.style;
  preview.style.fontSize = document.getElementById('fontSize').value + 'px';
  preview.style.letterSpacing = document.getElementById('letterSpacing').value + 'px';
  preview.style.lineHeight = document.getElementById('lineHeight').value;
  preview.style.color = document.getElementById('colorPicker').value;
  preview.style.fontWeight = bold ? '700' : '400';
  preview.style.fontStyle = italic ? 'italic' : 'normal';
  preview.textContent = document.getElementById('textInput').value || 'Váš text zde...';
}

document.getElementById('fontSize').oninput = e => { document.getElementById('sizeVal').textContent = e.target.value + 'px'; updatePreview(); };
document.getElementById('letterSpacing').oninput = e => { document.getElementById('spacingVal').textContent = e.target.value + 'px'; updatePreview(); };
document.getElementById('lineHeight').oninput = e => { document.getElementById('lineVal').textContent = e.target.value; updatePreview(); };
document.getElementById('colorPicker').oninput = e => { document.getElementById('colorHex').textContent = e.target.value.toUpperCase(); updatePreview(); };
document.getElementById('textInput').oninput = updatePreview;

function toggleBold() { bold = !bold; document.getElementById('boldBtn').classList.toggle('on'); updatePreview(); }
function toggleItalic() { italic = !italic; document.getElementById('italicBtn').classList.toggle('on'); updatePreview(); }
function setText(t) { document.getElementById('textInput').value = t; updatePreview(); }
function copyCSS() {
  const css = `font-family: ${selected.style};\nfont-size: ${document.getElementById('fontSize').value}px;\ncolor: ${document.getElementById('colorPicker').value};\nfont-weight: ${bold ? '700' : '400'};\nfont-style: ${italic ? 'italic' : 'normal'};\nletter-spacing: ${document.getElementById('letterSpacing').value}px;\nline-height: ${document.getElementById('lineHeight').value};`;
  navigator.clipboard.writeText(css);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ Zkopirováno';
  setTimeout(() => btn.textContent = 'Kopírovat CSS', 2000);
}
updatePreview();
</script>
</body>
</html>
